name: Harvest

# Refreshes `data/` from the configured sources and commits the result back
# to `main`. Does NOT publish to Pages — run the Deploy workflow separately
# (manually) once you're happy with the refreshed data. Independence between
# harvest and deploy is intentional: re-running the harvester should not
# automatically push potentially-broken data to the live site.
#
# WWI events are a closed historical record, so this is manual-only — no cron.

on:
  workflow_dispatch:
    inputs:
      enable:
        description: "Comma-separated source whitelist (e.g. thor,wd_battles). Leave blank to run every registered source."
        required: false
        default: ""
      disable:
        description: "Comma-separated source blacklist (e.g. osm_memorials). Leave blank to disable nothing."
        required: false
        default: ""
      countries:
        description: "OSM country whitelist for osm_memorials (e.g. DE,FR). Leave blank to sweep all."
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: ww1map-harvest
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: harvester/requirements.txt

      - name: Install harvester deps
        run: pip install -r harvester/requirements.txt

      - name: Run harvester
        env:
          W1M_ENABLE: ${{ github.event.inputs.enable }}
          W1M_DISABLE: ${{ github.event.inputs.disable }}
          W1M_COUNTRIES: ${{ github.event.inputs.countries }}
        run: python -m harvester

      - name: Commit data changes
        run: |
          git config user.name "ww1map-bot"
          git config user.email "ww1map-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes."
          else
            git commit -m "data: refresh $(date -u +%Y-%m-%d) (manual harvest)"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Harvest summary" >> $GITHUB_STEP_SUMMARY
          if [ -f data/manifest.json ]; then
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat data/manifest.json | python -c "import json,sys; m=json.load(sys.stdin); print(json.dumps({'generated_at': m.get('generated_at'), 'totals': m.get('totals'), 'sources': m.get('sources')}, indent=2))" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run the **Deploy** workflow when ready to publish these changes." >> $GITHUB_STEP_SUMMARY
